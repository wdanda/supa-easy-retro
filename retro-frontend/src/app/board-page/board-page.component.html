
<div class="board-shell" *ngIf="!locked">
  <div class="board-content" style="padding-top: 80px;">
    <app-board></app-board>
  </div>
</div>

<div class="password-gate" *ngIf="locked && probeChecked">
  <div class="card">
    <h3>Enter board password</h3>
    <form (submit)="submit(); $event.preventDefault()">
      <input name="password" [(ngModel)]="password" placeholder="Password" type="password"/>
      <div class="actions">
        <button type="submit">Enter</button>
      </div>
    </form>
    <div class="error" *ngIf="error">{{ error }}</div>
  </div>
</div>
