<header class="app-header">
  <button class="hamburger" aria-label="Menu" (click)="goDashboard()" title="Boards">
    <svg width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z"/></svg>
  </button>

  <div class="center">
    <div class="terminal-prompt">
      <span class="prompt-prefix">&gt; root@ASTRA_OS:~$ ./load_board</span>
      <span class="prompt-body"> {{ teamName }} <span class="date" *ngIf="createdAt"> - {{ createdAt | date:'yyyy-MM-dd' }}</span></span>
    </div>
  </div>

  <button class="export" (click)="exportPdf()" [disabled]="!boardId" title="Export PDF">
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M5 20h14v-2H5v2zm7-18-5 5h3v6h4v-6h3l-5-5z"/></svg>
  </button>
  <button class="theme-toggle" (click)="toggleTheme()" title="Toggle theme">
    <svg width="16" height="16" viewBox="0 0 24 24"><path fill="currentColor" d="M21.64 13a9 9 0 11-10.64-10.64 7 7 0 0010.64 10.64z"/></svg>
  </button>
</header>
